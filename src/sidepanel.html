<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WatchBuddy</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>WatchBuddy</h1>
          <p id="status">Ready to watch with you.</p>
        </div>
        <button id="settingsButton" class="icon-button" title="Settings">⚙</button>
      </header>

      <section id="settings" class="settings" hidden>
        <label>
          OpenAI API key
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
        </label>
        <label>
          Model
          <input id="model" type="text" autocomplete="off" />
        </label>
        <button id="saveSettings">Save</button>
      </section>

      <section id="contextCard" class="context-card">
        <span id="platform">No video page detected</span>
        <strong id="videoTitle">Open a supported video tab.</strong>
        <small id="timestamp"></small>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer">
        <button id="voiceButton" class="round-button" type="button" title="Talk">🎙</button>
        <textarea id="question" rows="2" placeholder="Ask about this moment..."></textarea>
        <button id="sendButton" class="send-button" type="submit">Send</button>
      </form>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
