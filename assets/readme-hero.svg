<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WatchBuddy product preview</title>
  <desc id="desc">A Chrome extension side panel that chats with the current video timestamp, transcript, and captions.</desc>
  <rect width="1200" height="630" rx="34" fill="#F7F3EA"/>
  <rect x="36" y="34" width="1128" height="562" rx="28" fill="#121212"/>
  <rect x="66" y="64" width="736" height="456" rx="18" fill="#232323"/>
  <rect x="86" y="84" width="696" height="392" rx="14" fill="#EEF4FF"/>
  <path d="M86 366H782V476H86V366Z" fill="#111827" fill-opacity=".88"/>
  <rect x="112" y="390" width="244" height="24" rx="12" fill="#F9FAFB"/>
  <rect x="112" y="430" width="492" height="14" rx="7" fill="#D1D5DB"/>
  <rect x="112" y="454" width="374" height="14" rx="7" fill="#9CA3AF"/>
  <circle cx="730" cy="423" r="28" fill="#2563EB"/>
  <path d="M724 407L746 423L724 439V407Z" fill="white"/>
  <rect x="126" y="116" width="570" height="34" rx="17" fill="#2563EB"/>
  <text x="150" y="139" fill="white" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Current timestamp + captions + transcript</text>
  <rect x="132" y="184" width="224" height="18" rx="9" fill="#111827" fill-opacity=".16"/>
  <rect x="132" y="218" width="406" height="18" rx="9" fill="#111827" fill-opacity=".12"/>
  <rect x="132" y="252" width="332" height="18" rx="9" fill="#111827" fill-opacity=".12"/>
  <rect x="132" y="286" width="452" height="18" rx="9" fill="#111827" fill-opacity=".12"/>
  <rect x="824" y="64" width="310" height="456" rx="18" fill="#FFFCF4"/>
  <rect x="846" y="86" width="266" height="68" rx="12" fill="white" stroke="#E6DDCE"/>
  <text x="864" y="114" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">WatchBuddy</text>
  <text x="864" y="139" fill="#6B665C" font-family="Inter, Arial, sans-serif" font-size="13">Ready. Ask about this moment.</text>
  <rect x="846" y="178" width="266" height="68" rx="12" fill="white" stroke="#E6DDCE"/>
  <text x="864" y="206" fill="#6B665C" font-family="Inter, Arial, sans-serif" font-size="13">You</text>
  <text x="864" y="229" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Answer in English. Where is this?</text>
  <rect x="846" y="270" width="266" height="126" rx="12" fill="#EAF0FF" stroke="#CBD8FF"/>
  <text x="864" y="300" fill="#1E3A8A" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">WatchBuddy</text>
  <text x="864" y="326" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15">
    <tspan x="864" dy="0">Based on the captions, this</tspan>
    <tspan x="864" dy="22">appears to be Matsuyama,</tspan>
    <tspan x="864" dy="22">Shikoku, Japan.</tspan>
  </text>
  <rect x="846" y="420" width="46" height="46" rx="12" fill="white" stroke="#E6DDCE"/>
  <text x="861" y="450" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="18">mic</text>
  <rect x="904" y="420" width="124" height="46" rx="12" fill="white" stroke="#E6DDCE"/>
  <text x="922" y="450" fill="#6B665C" font-family="Inter, Arial, sans-serif" font-size="14">Ask...</text>
  <rect x="1040" y="420" width="72" height="46" rx="12" fill="#2563EB"/>
  <text x="1061" y="450" fill="white" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Send</text>
  <text x="70" y="565" fill="#F9FAFB" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">Talk to the video you are watching.</text>
  <text x="72" y="595" fill="#D1D5DB" font-family="Inter, Arial, sans-serif" font-size="18">Transcript-aware chat, voice replies, dark mode, local or BYOK AI providers.</text>
  <rect x="840" y="548" width="124" height="32" rx="16" fill="#FDE68A"/>
  <text x="858" y="570" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">MIT licensed</text>
  <rect x="978" y="548" width="130" height="32" rx="16" fill="#D1FAE5"/>
  <text x="996" y="570" fill="#064E3B" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Built to fork</text>
</svg>
